<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Gold border top -->
  <rect x="0" y="0" width="1200" height="8" fill="#b8963e"/>
  <!-- Gold border bottom -->
  <rect x="0" y="622" width="1200" height="8" fill="#b8963e"/>

  <!-- Gold circle logo -->
  <circle cx="600" cy="210" r="80" fill="none" stroke="#b8963e" stroke-width="3"/>
  <circle cx="600" cy="210" r="68" fill="#b8963e" fill-opacity="0.15"/>
  <text x="600" y="195" text-anchor="middle" fill="#b8963e" font-size="28" font-family="Arial, sans-serif" font-weight="bold">شقق</text>
  <text x="600" y="230" text-anchor="middle" fill="#b8963e" font-size="28" font-family="Arial, sans-serif" font-weight="bold">قرطبة</text>

  <!-- Main title -->
  <text x="600" y="340" text-anchor="middle" fill="#ffffff" font-size="52" font-family="Arial, sans-serif" font-weight="bold">عقد إيجار</text>

  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" fill="#b8963e" font-size="30" font-family="Arial, sans-serif">Qurtubah Apartments — Rental Contract</text>

  <!-- Description -->
  <text x="600" y="460" text-anchor="middle" fill="#aaaaaa" font-size="24" font-family="Arial, sans-serif">يرجى مراجعة بنود العقد وتوقيعه إلكترونياً</text>

  <!-- Domain -->
  <text x="600" y="560" text-anchor="middle" fill="#666666" font-size="20" font-family="Arial, sans-serif">qurtubah-app.vercel.app</text>
</svg>
